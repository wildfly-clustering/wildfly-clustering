name: Verify

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  verify:
    strategy:
      matrix:
        os:
        - ubuntu-latest
        java:
        - 25
    name: Verify with Java ${{ matrix.java }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      MAVEN_GOAL: ${{ case((github.event_name == 'pull_request') && contains(github.event.pull_request.labels.*.name, 'unverified'), 'validate', 'verify -P lts') }}
    steps:
    - name: Environment
      env:
          VARS_JSON: ${{ toJSON(vars) }}
          ENV_JSON: ${{ toJSON(env) }}
      run: |
          echo "vars = ${VARS_JSON}"
          echo "env = ${ENV_JSON}"
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        java-version: |
          17
          21
          25
        distribution: temurin
        cache: maven
    - name: Verify
      run: mvn --batch-mode --no-transfer-progress ${{ env.MAVEN_GOAL }}
