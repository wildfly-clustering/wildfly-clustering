name: Verify

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  verify:
    name: Verify
    # Include only pull requests from forks
    if: (github.event.pull_request.head.repo.owner.id != github.event.pull_request.repository.owner.id)
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Context
        env:
          VARS_CONTEXT: ${{ toJSON(vars) }}
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: |
          echo "vars = $VARS_CONTEXT"
          echo "github = $GITHUB_CONTEXT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: |
            17
            25
            26
          distribution: temurin
          cache: maven

      - name: Maven verify
        run: mvn --batch-mode --no-transfer-progress ${{ case(contains(github.event.pull_request.labels.*.name, 'validate-only') == true, 'validate', 'verify --activate-profiles latest,lts') }}
